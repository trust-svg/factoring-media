name: Auto Generate Article

on:
  # 自動スケジュールは廃止（2026-06-09）。
  # 理由:
  #   1) note-auto の replenish が同じ content/articles に「レビュー済み」記事を
  #      生成・反映する一次経路になった（reflect_to_site.py で PR 化）。
  #   2) 本 generator は無レビューで main へ自動 push する設計で YMYL リスクがある。
  #   3) ネタ切れ時に find_next_target() が None を返し、空 diff →
  #      "No new articles to commit." でサイレント無処理のまま停止する事故があった
  #      （2026-05-13〜約4週間）。
  # 残置目的: KNOWLEDGE_PRIORITY のネタ在庫を使った手動バックアップ生成のみ。
  workflow_dispatch:           # 手動実行のみ

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles/
          git diff --staged --quiet \
            && echo "No new articles to commit." \
            || git commit -m "feat: auto-generate SEO article" && git push
