name: Deploy ebay-agent

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Deploy reason (optional)"
        required: false
        default: "manual deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/ebay-agent
            git pull
            docker compose restart ebay-agent
            echo "Deploy done: ${{ github.event.inputs.message }}"
