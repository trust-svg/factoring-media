name: Deploy ebay-agent

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Deploy reason (optional)"
        required: false
        default: "manual deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/apps/claude-workspace
            # VPS origin must stay trust-svg/Claude-Workspace.git.
            # (A prior version repointed it to factoring-media and reset --hard,
            #  which would roll the VPS back to a stale master — never again.)
            git remote -v | grep -q 'Claude-Workspace' \
              || { echo "ERROR: origin is not Claude-Workspace.git — aborting"; exit 1; }
            git fetch origin master
            # ff-only: never reset --hard, so VPS-local untracked files
            # (docker-compose.yml / .env / data/) are preserved and a diverged
            # history fails loudly instead of silently rolling back.
            git merge --ff-only origin/master
            echo "=== git log ==="
            git log --oneline -3
            cd products/ebay-agent
            # Code is baked into the image (not volume-mounted) → --build required.
            docker compose up -d --build --force-recreate --no-deps ebay-agent
            echo "=== container status ==="
            docker compose ps
            echo "Deploy done: ${{ github.event.inputs.message }}"
