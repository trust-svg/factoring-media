name: Deploy ebay-agent

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Deploy reason (optional)"
        required: false
        default: "manual deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/claude-workspace
            git remote set-url origin https://github.com/trust-svg/factoring-media.git
            git fetch origin master
            git reset --hard origin/master
            echo "=== git log ==="
            git log --oneline -3
            echo "=== new HTML check ==="
            grep -c "top-row\|ac blue" products/ebay-agent/templates/pages/overview.html || echo "NOT FOUND"
            cd products/ebay-agent
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            echo "=== container status ==="
            docker compose ps
            echo "Deploy done: ${{ github.event.inputs.message }}"
