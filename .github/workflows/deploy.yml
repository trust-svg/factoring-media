name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            git config --global --add safe.directory /root/factoring-media
            cd /root/factoring-media

            echo "--- git pull ---"
            BEFORE=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)
            echo "SHA: ${BEFORE:0:7} -> ${AFTER:0:7}"
            echo "Expected: ${GITHUB_SHA:0:7}"
            if [ "$AFTER" != "$GITHUB_SHA" ]; then
              echo "ERROR: VPS HEAD ($AFTER) does not match pushed SHA ($GITHUB_SHA)" >&2
              exit 1
            fi

            echo "--- docker compose build ---"
            docker compose build
            docker compose up -d

            echo "--- verify container running new image ---"
            docker compose ps
            echo "Deploy completed at $(date)"
