<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Sion 管理{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: #f5f5f5;
    color: #333;
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }
  header {
    background: linear-gradient(135deg, #6a0dad, #9b59b6);
    color: #fff;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 16px;
    text-align: center;
  }
  header h1 { font-size: 1.2rem; }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .card h3 { font-size: 1rem; margin-bottom: 8px; color: #6a0dad; }
  .card p { font-size: 0.9rem; line-height: 1.5; margin-bottom: 6px; }
  .meta { font-size: 0.8rem; color: #888; }
  .btn {
    display: inline-block;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: #6a0dad;
    color: #fff;
  }
  .btn-primary:active { background: #5a0b9d; }
  .btn-block { display: block; width: 100%; }
  textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    font-size: 0.95rem;
    line-height: 1.6;
    resize: vertical;
    min-height: 200px;
    font-family: inherit;
  }
  textarea:focus { outline-color: #6a0dad; border-color: #6a0dad; }
  .empty { text-align: center; padding: 40px 16px; color: #888; }
  .label {
    display: inline-block;
    background: #e8d5f5;
    color: #6a0dad;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
  }
  .section-label { font-weight: bold; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
  .user-msg {
    background: #f0f0f0;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 12px;
    font-size: 0.9rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <header>
    <h1>🔮 Sion 管理画面</h1>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
