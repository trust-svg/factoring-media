<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資シミュレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:          #f8fafc;
            --surface:     #ffffff;
            --card:        #ffffff;
            --border:      #e2e8f0;
            --border-med:  #cbd5e1;
            --accent:      #3b82f6;
            --accent-dim:  rgba(59,130,246,0.08);
            --text:        #0f172a;
            --sub:         #1e293b;
            --muted:       #64748b;
            --gain:        #10b981;
            --gain-bg:     rgba(16,185,129,0.10);
            --loss:        #ef4444;
            --loss-bg:     rgba(239,68,68,0.10);
            --buy:         #1d4ed8;
            --buy-bg:      #dbeafe;
            --sell:        #c2410c;
            --sell-bg:     #ffedd5;
            --hold:        #64748b;
            --hold-bg:     #f1f5f9;
            --amber:       #f59e0b;
            --amber-bg:    rgba(245,158,11,0.10);
            --mono:        'JetBrains Mono', monospace;
            --body:        'Inter', sans-serif;
            --shadow-sm:   0 1px 3px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04);
            --shadow-md:   0 4px 12px rgba(15,23,42,0.08), 0 2px 4px rgba(15,23,42,0.04);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── HEADER ─────────────────────────────────────────── */
        .header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 60px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            box-shadow: var(--shadow-sm);
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .logo-dot {
            width: 10px; height: 10px;
            background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 0 3px var(--accent-dim);
            animation: pulse-glow 2.2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%,100% { box-shadow: 0 0 0 3px var(--accent-dim); }
            50%      { box-shadow: 0 0 0 5px rgba(37,99,235,0.04); }
        }

        .title {
            font-size: 17px; font-weight: 700;
            letter-spacing: -0.3px; color: var(--text);
        }
        .title em { color: var(--accent); font-style: normal; }

        /* market badges */
        .market-badges { display: flex; gap: 8px; }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px;
            font-family: var(--mono); font-size: 11px; font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid; transition: all .3s;
        }
        .badge-dot { width: 7px; height: 7px; border-radius: 50%; }
        .badge.open  { background: var(--gain-bg); border-color: rgba(5,150,105,.25); color: var(--gain); }
        .badge.open .badge-dot { background: var(--gain); animation: pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; } 50% { opacity: .4; }
        }
        .badge.closed { background: #F8FAFC; border-color: var(--border); color: var(--muted); }
        .badge.closed .badge-dot { background: var(--muted); }

        /* header buttons */
        .header-right { display: flex; align-items: center; gap: 8px; }

        .btn {
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-family: var(--body); font-size: 13px; font-weight: 600;
            border: 1px solid; transition: all .15s;
        }
        .btn-jp  { background: var(--buy-bg); border-color: rgba(37,99,235,.25); color: var(--buy); }
        .btn-jp:hover  { background: rgba(37,99,235,.14); border-color: rgba(37,99,235,.4); box-shadow: var(--shadow-sm); }
        .btn-us  { background: var(--sell-bg); border-color: rgba(234,88,12,.25); color: var(--sell); }
        .btn-us:hover  { background: rgba(234,88,12,.14); border-color: rgba(234,88,12,.4); box-shadow: var(--shadow-sm); }
        .btn-reset { background: var(--loss-bg); border-color: rgba(220,38,38,.2); color: var(--loss); }
        .btn-reset:hover { background: rgba(220,38,38,.14); border-color: rgba(220,38,38,.35); }

        .ts {
            font-family: var(--mono); font-size: 12px; color: var(--muted);
            min-width: 70px; text-align: right;
        }

        /* ─── MAIN ────────────────────────────────────────────── */
        .main { padding: 28px 32px; max-width: 1680px; margin: 0 auto; }

        /* ─── METRIC CARDS ────────────────────────────────────── */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px; margin-bottom: 20px;
        }

        .metric-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-top: 4px solid var(--border);
            padding: 22px 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .2s, border-color .2s;
        }
        .metric-card:hover { box-shadow: var(--shadow-md); }

        .metric-label {
            font-size: 12px; font-weight: 600;
            letter-spacing: 0.4px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 10px;
        }
        .metric-value {
            font-family: var(--mono); font-size: 34px; font-weight: 600;
            line-height: 1; color: var(--text);
            transition: color .3s; letter-spacing: -1px;
        }
        .metric-value.pos { color: var(--gain); }
        .metric-value.neg { color: var(--loss); }
        .metric-sub {
            font-size: 12px; color: var(--muted); margin-top: 8px;
        }
        .metric-pill {
            display: inline-flex; align-items: center;
            padding: 3px 10px; border-radius: 20px;
            font-family: var(--mono); font-size: 11px; font-weight: 600;
            margin-top: 8px;
        }
        .metric-pill.pos { background: var(--gain-bg); color: var(--gain); }
        .metric-pill.neg { background: var(--loss-bg); color: var(--loss); }
        .metric-pill.neu { background: var(--amber-bg); color: var(--amber); }

        /* ─── MIDDLE: CHART + POSITIONS ───────────────────────── */
        .mid-row {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 16px; margin-bottom: 20px;
        }

        /* ─── PANEL ───────────────────────────────────────────── */
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .panel-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid var(--border);
        }
        .panel-title {
            font-size: 14px; font-weight: 700;
            letter-spacing: -0.1px; color: var(--text);
        }
        .panel-meta { font-family: var(--mono); font-size: 12px; color: var(--muted); }

        /* chart */
        .chart-wrap { padding: 20px; background: #f8fafc; border-radius: 8px; margin: 12px; }
        .chart-canvas-wrap { position: relative; height: 280px; }

        /* positions */
        .pos-list {
            padding: 12px; display: flex; flex-direction: column; gap: 8px;
            max-height: 340px; overflow-y: auto;
        }
        .pos-list::-webkit-scrollbar { width: 4px; }
        .pos-list::-webkit-scrollbar-track { background: #F8FAFC; }
        .pos-list::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 4px; }

        .pos-item {
            background: #F8FAFC; border: 1px solid var(--border);
            border-radius: 8px; padding: 12px 14px;
            display: flex; justify-content: space-between; align-items: center;
            transition: border-color .15s, box-shadow .15s;
        }
        .pos-item:hover { border-color: var(--border-med); box-shadow: var(--shadow-sm); }

        .pos-ticker {
            font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--text);
        }
        .pos-mkt {
            display: inline-block; margin-left: 6px;
            font-family: var(--mono); font-size: 10px; font-weight: 700;
            letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px;
            background: var(--accent-dim); color: var(--accent);
        }
        .pos-shares { font-size: 12px; color: var(--muted); margin-top: 3px; }
        .pos-right { text-align: right; }
        .pos-pnl { font-family: var(--mono); font-size: 14px; font-weight: 600; }
        .pos-val  { font-size: 12px; color: var(--muted); margin-top: 3px; }

        /* ─── POSITIONS BAR CHART ─────────────────────────────── */
        .bar-list {
            padding: 16px; display: flex; flex-direction: column; gap: 10px;
        }
        .bar-item {
            display: flex; align-items: center; gap: 10px;
        }
        .bar-ticker {
            font-family: var(--mono); font-size: 12px; font-weight: 600;
            color: var(--text); min-width: 70px; flex-shrink: 0;
        }
        .bar-track {
            flex: 1; height: 8px; background: var(--border);
            border-radius: 4px; overflow: hidden;
        }
        .bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.4s ease;
        }
        .bar-fill.pos { background: var(--accent); }
        .bar-fill.neg { background: #fca5a5; }
        .bar-pct {
            font-family: var(--mono); font-size: 12px; font-weight: 600;
            min-width: 56px; text-align: right; flex-shrink: 0;
        }

        .gain { color: var(--gain); }
        .loss { color: var(--loss); }
        .neut { color: var(--muted); }

        .empty {
            text-align: center; padding: 40px 16px;
            color: var(--muted); font-size: 13px;
        }

        /* ─── TRADE LOG ───────────────────────────────────────── */
        .trades-scroll { max-height: 320px; overflow-y: auto; }
        .trades-scroll::-webkit-scrollbar { width: 4px; }
        .trades-scroll::-webkit-scrollbar-track { background: #F8FAFC; }
        .trades-scroll::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 4px; }
        .pagination {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 12px 20px; border-top: 1px solid var(--border);
        }
        .page-btn {
            padding: 5px 14px; border: 1px solid var(--border-med); border-radius: 6px;
            background: var(--surface); color: var(--sub); font-size: 13px; font-weight: 500;
            cursor: pointer; transition: background 0.15s;
        }
        .page-btn:hover:not(:disabled) { background: var(--accent-dim); color: var(--accent); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }

        table { width: 100%; border-collapse: collapse; }
        th {
            padding: 12px 18px; text-align: left;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: #FAFBFC;
        }
        td { padding: 11px 18px; font-size: 13px; border-bottom: 1px solid #f8fafc; vertical-align: middle; color: var(--sub); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #F8FAFC; }

        .act-badge {
            display: inline-flex; align-items: center;
            padding: 3px 10px; border-radius: 5px;
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            letter-spacing: 0.5px;
        }
        .act-badge.BUY  { background: #dbeafe; color: #1d4ed8; }
        .act-badge.SELL { background: #ffedd5; color: #c2410c; }
        .act-badge.HOLD { background: #f1f5f9; color: #64748b; }

        .mono-td { font-family: var(--mono); color: var(--text); }
        .reason-td { font-size: 12px; color: var(--muted); max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ─── AI LOG ──────────────────────────────────────────── */
        .ai-log-list {
            padding: 12px; display: flex; flex-direction: column; gap: 8px;
        }
        .ai-log-entry {
            background: #f8fafc; border-radius: 8px;
            border-left: 3px solid var(--border-med);
            padding: 10px 14px;
        }
        .ai-log-entry.BUY  { border-left-color: #3b82f6; }
        .ai-log-entry.SELL { border-left-color: #f97316; }
        .ai-log-entry.HOLD { border-left-color: #cbd5e1; }
        .ai-log-head {
            display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
        }
        .ai-log-badge {
            font-family: var(--mono); font-size: 10px; font-weight: 700;
            letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px;
        }
        .ai-log-badge.BUY  { background: #dbeafe; color: #1d4ed8; }
        .ai-log-badge.SELL { background: #ffedd5; color: #c2410c; }
        .ai-log-badge.HOLD { background: #f1f5f9; color: #64748b; }
        .ai-log-ticker {
            font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text);
        }
        .ai-log-ts { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }
        .ai-log-body {
            font-size: 12px; color: var(--sub); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* flash on update */
        @keyframes flash {
            0%   { background: rgba(37,99,235,.08); }
            100% { background: transparent; }
        }
        .flash { animation: flash .5s ease-out; }

        /* ─── STATUS BAR ──────────────────────────────────────── */
        .status-bar {
            display: flex; align-items: center; gap: 0;
            padding: 0 32px; height: 42px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-wrap: wrap;
        }
        .status-item {
            display: flex; align-items: center; gap: 7px;
            padding: 0 20px 0 0; margin-right: 20px;
            border-right: 1px solid var(--border); height: 100%;
            font-family: var(--mono); font-size: 12px;
        }
        .status-item:last-child { border-right: none; }
        .status-lbl { color: var(--muted); font-size: 11px; letter-spacing: 0.3px; text-transform: uppercase; }
        .status-val { color: var(--text); font-weight: 600; }
        .status-val.running { color: var(--gain); }
        .status-val.stopped { color: var(--loss); }
        .sched-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted); flex-shrink: 0;
        }
        .sched-dot.running {
            background: var(--gain);
            box-shadow: 0 0 0 3px var(--gain-bg);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        /* responsive */
        @media(max-width:1200px) { .mid-row { grid-template-columns: 1fr; } }
        @media(max-width:900px)  {
            .metrics-row { grid-template-columns: 1fr 1fr; }
            .main { padding: 16px; }
            .header { padding: 0 16px; flex-wrap: wrap; height: auto; padding-top: 10px; padding-bottom: 10px; gap: 10px; }
            .status-bar { padding: 8px 16px; height: auto; gap: 8px; }
        }
    </style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="header">
    <div class="header-left">
        <div class="logo-dot"></div>
        <div class="title">AI <em>投資</em> シミュレーター</div>
    </div>

    <div class="market-badges">
        <div class="badge closed" id="bdg-jp"><div class="badge-dot"></div>JP 閉場</div>
        <div class="badge closed" id="bdg-us"><div class="badge-dot"></div>US 閉場</div>
    </div>

    <div class="header-right">
        <span class="ts" id="ts">--:--:--</span>
        <button class="btn btn-jp"    onclick="manualTrade('JP')">▶ JP 手動実行</button>
        <button class="btn btn-us"    onclick="manualTrade('US')">▶ US 手動実行</button>
        <button class="btn btn-reset" onclick="resetSim()">⟳ リセット</button>
    </div>
</header>

<!-- ═══════════ STATUS BAR ═══════════ -->
<div class="status-bar">
    <div class="status-item">
        <div class="sched-dot" id="sched-dot"></div>
        <span class="status-lbl">スケジューラ</span>
        <span class="status-val" id="sched-val">—</span>
    </div>
    <div class="status-item">
        <span class="status-lbl">JP 次回</span>
        <span class="status-val" id="next-jp">—</span>
    </div>
    <div class="status-item">
        <span class="status-lbl">US 次回</span>
        <span class="status-val" id="next-us">—</span>
    </div>
    <div class="status-item">
        <span class="status-lbl">JP 最終</span>
        <span class="status-val" id="last-jp">—</span>
    </div>
    <div class="status-item">
        <span class="status-lbl">US 最終</span>
        <span class="status-val" id="last-us">—</span>
    </div>
    <div class="status-item">
        <span class="status-lbl">稼働時間</span>
        <span class="status-val" id="uptime-val">—</span>
    </div>
</div>

<!-- ═══════════ MAIN ═══════════ -->
<main class="main">

    <!-- Metrics -->
    <div class="metrics-row">
        <div class="metric-card" style="border-top-color:#3b82f6">
            <div class="metric-label">総資産</div>
            <div class="metric-value" id="m-total">$—</div>
            <div class="metric-sub" id="m-total-jpy">≈ ¥—</div>
            <div id="m-total-pill" class="metric-pill neu">初期比 —%</div>
        </div>
        <div class="metric-card" id="m-pnl-card" style="border-top-color:#10b981">
            <div class="metric-label">含み損益</div>
            <div class="metric-value" id="m-pnl">$—</div>
            <div class="metric-sub" id="m-pnl-jpy">≈ ¥—</div>
            <div id="m-pnl-pill" class="metric-pill pos">全体 —%</div>
        </div>
        <div class="metric-card" style="border-top-color:#f59e0b">
            <div class="metric-label">現金残高</div>
            <div class="metric-value" id="m-cash-val">$—</div>
            <div class="metric-sub" id="m-cash-sub">JP $— / US $—</div>
            <div id="m-cash-pill" class="metric-pill neu">総資産比 —%</div>
        </div>
    </div>

    <!-- Chart + Positions -->
    <div class="mid-row">
        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">ポートフォリオ推移</span>
                <span class="panel-meta" id="chart-pts">0 pt</span>
            </div>
            <div class="chart-wrap">
                <div class="chart-canvas-wrap">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">保有銘柄</span>
                <span class="panel-meta" id="pos-ct">0 銘柄</span>
            </div>
            <div class="bar-list" id="pos-list">
                <div class="empty">ポジションなし</div>
            </div>
        </div>
    </div>

    <!-- Trade Log -->
    <div class="panel">
        <div class="panel-head">
            <span class="panel-title">取引履歴</span>
            <span class="panel-meta" id="trade-ct">0 件</span>
        </div>
        <div class="trades-scroll">
            <table>
                <thead>
                    <tr>
                        <th>アクション</th><th>銘柄</th><th>株数</th>
                        <th>価格</th><th>損益</th><th>理由</th><th>時刻</th>
                    </tr>
                </thead>
                <tbody id="trade-body">
                    <tr><td colspan="7" class="empty">取引履歴なし</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="trade-pagination">
            <button class="page-btn" id="trade-prev" onclick="tradePage(-1)" disabled>&#8249; 前へ</button>
            <span class="page-info" id="trade-page-info">1 / 1</span>
            <button class="page-btn" id="trade-next" onclick="tradePage(1)" disabled>次へ &#8250;</button>
        </div>
    </div>

    <!-- AI Analysis Log -->
    <div class="panel" style="margin-top:20px">
        <div class="panel-head">
            <span class="panel-title">AI 分析ログ</span>
            <span class="panel-meta" id="cycle-ct">0 件</span>
        </div>
        <div class="ai-log-list" id="cycle-log-body">
            <div class="empty">ログなし</div>
        </div>
    </div>

</main>

<script>
const API = '';
let chart = null;
let _usdjpy = 150;

/* ── chart init ── */
function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Portfolio ($)',
                data: [],
                borderColor: '#2563EB',
                backgroundColor: 'rgba(37,99,235,0.06)',
                borderWidth: 2,
                pointRadius: 0,
                pointHoverRadius: 5,
                pointHoverBackgroundColor: '#2563EB',
                tension: 0.35,
                fill: true,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#FFFFFF',
                    borderColor: '#E2E8F0', borderWidth: 1,
                    titleColor: '#94A3B8',
                    bodyColor: '#0F172A',
                    bodyFont: { family: 'JetBrains Mono', size: 12 },
                    padding: 10,
                    callbacks: { label: c => `$${c.raw.toFixed(2)}` }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(226,232,240,.8)', drawBorder: false },
                    ticks: { color: '#94A3B8', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 8, maxRotation: 0 }
                },
                y: {
                    grid: { color: 'rgba(226,232,240,.8)', drawBorder: false },
                    ticks: { color: '#94A3B8', font: { family: 'JetBrains Mono', size: 11 }, callback: v => `$${v.toLocaleString()}` }
                }
            },
            interaction: { intersect: false, mode: 'index' },
            animation: { duration: 350 }
        }
    });
}

/* ── formatters ── */
const f$ = v  => '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fS = v  => (v >= 0 ? '+' : '−') + f$(Math.abs(v));
const fP = v  => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
const fY = v  => '¥' + Math.round(Math.abs(v)).toLocaleString('ja-JP');
const fYS = v => (v >= 0 ? '+' : '−') + fY(v);
const fT = ts => { const d = new Date(ts); return d.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}); };
const fD = ts => { const d = new Date(ts); return (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getDate().toString().padStart(2,'0') + ' ' + fT(ts); };

function flash(el) {
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
}

/* ── portfolio ── */
async function fetchPortfolio() {
    const d = await fetch(`${API}/api/portfolio`).then(r => r.json());
    _usdjpy = d.usdjpy || 150;

    const te = document.getElementById('m-total');
    te.textContent = f$(d.total_value); flash(te);

    const pe = document.getElementById('m-pnl');
    pe.textContent = fS(d.pnl);
    pe.className = 'metric-value ' + (d.pnl >= 0 ? 'pos' : 'neg');

    const re = document.getElementById('m-pct');
    re.textContent = fP(d.pnl_pct);
    re.className = 'metric-value ' + (d.pnl_pct >= 0 ? 'pos' : 'neg');

    document.getElementById('m-fx').textContent = '¥' + d.usdjpy.toFixed(2);
    document.getElementById('m-cash').textContent = `JP ${f$(d.cash_jp)} / US ${f$(d.cash_us)}`;
    document.getElementById('m-total-jpy').textContent = `≈ ${fY(d.total_value * _usdjpy)}`;
    const pnlJpy = document.getElementById('m-pnl-jpy');
    pnlJpy.textContent = `≈ ${fYS(d.pnl * _usdjpy)}`;
    pnlJpy.style.color = d.pnl >= 0 ? 'var(--gain)' : 'var(--loss)';
    document.getElementById('m-posval').textContent = `保有: ${f$(d.position_value)} / ${fY(d.position_value * _usdjpy)}`;
    document.getElementById('m-mkt').textContent =
        `JP: ${d.jp_market_open ? '▲ 開場' : '— 閉場'} / US: ${d.us_market_open ? '▲ 開場' : '— 閉場'}`;

    const upd = (id, open, label) => {
        const el = document.getElementById(id);
        el.className = `badge ${open ? 'open' : 'closed'}`;
        el.innerHTML = `<div class="badge-dot"></div>${label} ${open ? '開場' : '閉場'}`;
    };
    upd('bdg-jp', d.jp_market_open, 'JP');
    upd('bdg-us', d.us_market_open, 'US');
}

/* ── positions ── */
async function fetchPositions() {
    const data = await fetch(`${API}/api/positions`).then(r => r.json());
    document.getElementById('pos-ct').textContent = `${data.length} 銘柄`;
    const list = document.getElementById('pos-list');
    if (!data.length) { list.innerHTML = '<div class="empty">保有銘柄なし</div>'; return; }
    list.innerHTML = data.map(p => {
        const cls = p.pnl_pct >= 0 ? 'gain' : 'loss';
        const jpy = fY(p.current_value * _usdjpy);
        return `
        <div class="pos-item">
            <div>
                <span class="pos-ticker">${p.ticker}</span><span class="pos-mkt">${p.market}</span>
                <div class="pos-shares">${p.shares}株 @ ${f$(p.avg_cost)}</div>
            </div>
            <div class="pos-right">
                <div class="pos-pnl ${cls}">${fP(p.pnl_pct)}</div>
                <div class="pos-val">${f$(p.current_value)} <span style="color:var(--accent);font-size:11px">${jpy}</span></div>
            </div>
        </div>`;
    }).join('');
}

/* ── trades (paginated) ── */
let _tradePage = 1;
const _tradeLimit = 20;

async function fetchTrades(page) {
    if (page !== undefined) _tradePage = page;
    const res = await fetch(`${API}/api/trades?page=${_tradePage}&limit=${_tradeLimit}`).then(r => r.json());
    const items = res.items || [];
    document.getElementById('trade-ct').textContent = `${res.total} 件`;
    document.getElementById('trade-page-info').textContent = `${res.page} / ${res.pages}`;
    document.getElementById('trade-prev').disabled = res.page <= 1;
    document.getElementById('trade-next').disabled = res.page >= res.pages;
    const tb = document.getElementById('trade-body');
    if (!items.length) {
        tb.innerHTML = '<tr><td colspan="7" class="empty">取引履歴なし</td></tr>';
        return;
    }
    tb.innerHTML = items.map(t => {
        const pnlHtml = t.pnl != null
            ? `<span class="mono-td ${t.pnl >= 0 ? 'gain' : 'loss'}">${fS(t.pnl)}</span>`
            : '<span class="neut">—</span>';
        return `
        <tr>
            <td><span class="act-badge ${t.action}">${t.action}</span></td>
            <td class="mono-td">${t.ticker || '—'}</td>
            <td class="mono-td">${t.shares ?? '—'}</td>
            <td class="mono-td">${t.price ? f$(t.price) : '—'}</td>
            <td>${pnlHtml}</td>
            <td class="reason-td" title="${t.reason || ''}">${t.reason || '—'}</td>
            <td class="mono-td" style="font-size:10px">${fD(t.executed_at)}</td>
        </tr>`;
    }).join('');
}

function tradePage(delta) {
    fetchTrades(_tradePage + delta);
}

/* ── chart data ── */
async function fetchChart() {
    const data = await fetch(`${API}/api/snapshots`).then(r => r.json());
    document.getElementById('chart-pts').textContent = `${data.length} pt`;
    if (!data.length || !chart) return;
    chart.data.labels = data.map(s => fT(s.recorded_at));
    chart.data.datasets[0].data = data.map(s => s.total_value);
    const first = data[0].total_value, last = data[data.length-1].total_value;
    const up = last >= first;
    chart.data.datasets[0].borderColor     = up ? '#059669' : '#DC2626';
    chart.data.datasets[0].backgroundColor = up ? 'rgba(5,150,105,0.06)' : 'rgba(220,38,38,0.06)';
    chart.update('none');
}

/* ── cycle log ── */
function actionColor(a) {
    if (a === 'BUY')  return 'var(--buy)';
    if (a === 'SELL') return 'var(--sell)';
    return 'var(--hold)';
}
function actionBg(a) {
    if (a === 'BUY')  return 'var(--buy-bg)';
    if (a === 'SELL') return 'var(--sell-bg)';
    return '#F1F5F9';
}
function toggleCycle(el) {
    const body = el.nextElementSibling;
    const tog  = el.querySelector('.cycle-toggle');
    body.classList.toggle('open');
    tog.textContent = body.classList.contains('open') ? '▲ 閉じる' : '▼ 展開';
}
async function fetchCycleLog() {
    try {
        const data = await fetch(`${API}/api/cycle_log`).then(r => r.json());
        document.getElementById('cycle-ct').textContent = `${data.length} 件`;
        const container = document.getElementById('cycle-log-body');
        if (!data.length) {
            container.innerHTML = '<div class="empty">サイクルログなし（初回取引サイクル後に表示されます）</div>';
            return;
        }
        container.innerHTML = data.map((log, i) => {
            const ts  = new Date(log.timestamp).toLocaleString('ja-JP');
            const decisions = log.decisions || [];
            const summary = decisions.length
                ? decisions.map(d => d.action === 'HOLD' ? 'HOLD' : `${d.action} ${d.ticker}`).join(' / ')
                : 'ツール未実行';
            const decisionsHtml = decisions.length
                ? decisions.map(d => `
                    <div class="cycle-decision">
                        <span class="act-badge ${d.action}" style="background:${actionBg(d.action)};color:${actionColor(d.action)};font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;flex-shrink:0">${d.action}</span>
                        <div>
                            ${d.ticker ? `<div style="font-family:var(--mono);font-size:13px;font-weight:600;margin-bottom:3px;color:var(--text)">${d.ticker}${d.shares ? ` × ${d.shares}株` : ''} ${d.price ? `@ $${d.price.toFixed(2)}` : ''}</div>` : ''}
                            <div class="cycle-decision-reason">${d.reason || ''}</div>
                        </div>
                    </div>`).join('')
                : '<div style="font-size:13px;color:var(--muted)">ツールが呼び出されませんでした</div>';
            return `
                <div class="cycle-entry">
                    <div class="cycle-entry-head" onclick="toggleCycle(this)">
                        <span class="cycle-mkt ${log.market}">${log.market}</span>
                        <span class="cycle-ts">${ts}</span>
                        <span class="cycle-summary">${summary}</span>
                        <span class="cycle-toggle">▼ 展開</span>
                    </div>
                    <div class="cycle-body${i === 0 ? ' open' : ''}">
                        <div class="cycle-section-title">Claude への入力</div>
                        <div class="cycle-input">${log.input.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                        <div class="cycle-section-title">判断結果</div>
                        ${decisionsHtml}
                    </div>
                </div>`;
        }).join('');
        // 最新エントリのトグルを更新
        const firstHead = container.querySelector('.cycle-entry-head');
        if (firstHead) firstHead.querySelector('.cycle-toggle').textContent = '▲ 閉じる';
    } catch(e) { /* silent */ }
}

/* ── status ── */
function fmtNext(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
function fmtAgo(iso) {
    if (!iso) return '—';
    const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60) return `${diff}秒前`;
    if (diff < 3600) return `${Math.floor(diff/60)}分前`;
    if (diff < 86400) return `${Math.floor(diff/3600)}時間前`;
    return `${Math.floor(diff/86400)}日前`;
}
function fmtUptime(sec) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
async function fetchStatus() {
    try {
        const d = await fetch(`${API}/api/status`).then(r => r.json());
        const dot = document.getElementById('sched-dot');
        const val = document.getElementById('sched-val');
        if (d.scheduler_running) {
            dot.className = 'sched-dot running';
            val.textContent = 'RUNNING'; val.className = 'status-val running';
        } else {
            dot.className = 'sched-dot';
            val.textContent = 'STOPPED'; val.className = 'status-val stopped';
        }
        document.getElementById('next-jp').textContent = fmtNext(d.next_jp_run);
        document.getElementById('next-us').textContent = fmtNext(d.next_us_run);
        document.getElementById('last-jp').textContent = fmtAgo(d.last_jp_run);
        document.getElementById('last-us').textContent = fmtAgo(d.last_us_run);
        document.getElementById('uptime-val').textContent = fmtUptime(d.uptime_seconds);
    } catch(e) { /* silent */ }
}

/* ── manual trade ── */
async function manualTrade(market) {
    try {
        const r = await fetch(`${API}/api/trade/manual`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({market})
        });
        const d = await r.json();
        console.log('trade result:', d);
        await refresh();
    } catch(e) { alert('エラー: ' + e.message); }
}

/* ── reset ── */
async function resetSim() {
    if (!confirm('シミュレーションをリセットしますか？\n全データ（ポジション・取引履歴）が削除されます。')) return;
    try {
        await fetch(`${API}/api/reset`, {method:'POST'});
        if (chart) { chart.data.labels=[]; chart.data.datasets[0].data=[]; chart.update(); }
        await refresh();
    } catch(e) { alert('エラー: ' + e.message); }
}

/* ── full refresh ── */
async function refresh() {
    await Promise.allSettled([fetchPortfolio(), fetchPositions(), fetchTrades(), fetchChart(), fetchStatus(), fetchCycleLog()]);
    document.getElementById('ts').textContent = new Date().toLocaleTimeString('ja-JP');
}

initChart();
refresh();
setInterval(refresh, 30000);
</script>
