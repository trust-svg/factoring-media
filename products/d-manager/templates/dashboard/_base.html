<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{% block title %}d-manager Dashboard{% endblock %}</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1c232b;
    --border: #2a3340;
    --text: #d8e0e8;
    --muted: #8a96a4;
    --accent: #5fb3d8;
    --green: #6fd16f;
    --yellow: #e0c060;
    --red: #e07060;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.6; }
  nav { background: var(--panel); padding: 12px 20px; border-bottom: 1px solid var(--border);
        display: flex; gap: 18px; align-items: center; }
  nav a { color: var(--text); text-decoration: none; font-weight: 500; }
  nav a:hover { color: var(--accent); }
  nav .brand { font-weight: 700; color: var(--accent); margin-right: 12px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 24px; margin: 0 0 16px; }
  h2 { font-size: 18px; margin: 24px 0 10px; color: var(--accent); }
  h3 { font-size: 15px; margin: 16px 0 6px; color: var(--muted); }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
           padding: 16px 18px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 13px; }
  a { color: var(--accent); }
  pre { background: #0a0e12; padding: 14px; border-radius: 6px; overflow-x: auto;
        white-space: pre-wrap; word-break: break-word; font-size: 13px;
        border: 1px solid var(--border); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px;
           background: var(--border); }
  .badge.open { background: #2a4055; color: var(--accent); }
  .badge.in_progress { background: #4a4530; color: var(--yellow); }
  .badge.blocked { background: #4a3030; color: var(--red); }
  .badge.done { background: #2a4530; color: var(--green); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
          padding: 12px 16px; min-width: 130px; }
  .stat .num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 12px; color: var(--muted); }
  ul { padding-left: 18px; }
  .mode-sequential { color: var(--accent); }
  .mode-parallel { color: var(--yellow); }
  .mode-loop { color: var(--green); }
</style>
</head>
<body>
<nav>
  <span class="brand">🤖 d-manager</span>
  <a href="{{ url_for('index') }}">Overview</a>
  <a href="{{ url_for('tickets_index') }}">Tickets</a>
  <a href="{{ url_for('memory_index') }}">Memory</a>
  <a href="{{ url_for('flows_index') }}">Flows</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
