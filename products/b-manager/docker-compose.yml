services:
  b-manager:
    build: .
    container_name: b-manager
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - EBAY_AGENT_URL=http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
