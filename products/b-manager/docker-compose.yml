services:
  b-manager:
    build: .
    container_name: b-manager
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    env_file:
      - .env
    environment:
      - TZ=Asia/Tokyo
      - EBAY_AGENT_URL=http://ebay-agent:8000
    networks:
      - default
      - ebay-agent_default

networks:
  ebay-agent_default:
    external: true
