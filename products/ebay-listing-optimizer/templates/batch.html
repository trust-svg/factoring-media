{% extends "base.html" %}
{% block title %}Batch Operations — eBay SEO Optimizer{% endblock %}

{% block content %}
<h1 style="font-size:24px;margin-bottom:20px">Batch Operations</h1>

<!-- Actions -->
<div class="actions-bar">
  <button class="btn btn-secondary" onclick="selectAllBatch()">Select All</button>
  <button class="btn btn-secondary" onclick="deselectAllBatch()">Deselect All</button>
  <button class="btn btn-primary" onclick="batchOptimize()">Optimize Selected</button>
</div>

<!-- Progress -->
<div id="batch-progress" style="display:none">
  <div class="progress-bar">
    <div class="progress-fill" id="batch-progress-fill" style="width:0%"></div>
  </div>
  <div id="batch-progress-text" style="font-size:13px;color:#888"></div>
</div>

<!-- Listings Table -->
<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th style="width:32px"><input type="checkbox" id="batch-select-all"></th>
        <th>Title</th>
        <th style="width:80px">Score</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody id="batch-table">
      <tr><td colspan="4" class="loading"><span class="spinner"></span> Loading...</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("batch-select-all").addEventListener("change", function() {
  document.querySelectorAll(".batch-check").forEach(cb => cb.checked = this.checked);
});
</script>
{% endblock %}
