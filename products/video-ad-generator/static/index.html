<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Ad Generator</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/generate.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* image-grid / video-grid for pending + confirmed panels */
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--space-md); margin-top: var(--space-md); }
    .image-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .image-card img { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; }
    .image-card .card-footer { padding: var(--space-sm); display: flex; gap: 6px; }
    .image-card .card-footer .btn { flex: 1; padding: 6px 8px; font-size: 12px; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-md); margin-top: var(--space-md); }
    .video-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .video-card video { width: 100%; aspect-ratio: 9/16; object-fit: cover; }
    .video-card .card-info { padding: var(--space-sm); font-size: 12px; color: var(--text-secondary); }

    .btn { padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font-body); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { padding: 10px 20px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text-primary); cursor: pointer; font-size: 14px; font-family: var(--font-body); }
    .btn-secondary:hover { background: var(--surface); }

    .empty-state { text-align: center; padding: 48px; color: var(--text-secondary); }

    /* image-source file input shown when upload mode active */
    #image-file { width: 100%; margin-top: var(--space-sm); }

    #toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; display: none; z-index: 9999; }

    .canvas h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: var(--space-sm); }
  </style>
</head>
<body>

<!-- Inline aspect-ratio icons so <use href="#aspect-..."> resolves -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="aspect-9-16" viewBox="0 0 32 32">
    <rect x="9.5" y="2" width="13" height="28" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  </symbol>
  <symbol id="aspect-16-9" viewBox="0 0 32 32">
    <rect x="2" y="9.5" width="28" height="13" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  </symbol>
  <symbol id="aspect-1-1" viewBox="0 0 32 32">
    <rect x="4" y="4" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  </symbol>
  <symbol id="aspect-4-3" viewBox="0 0 32 32">
    <rect x="2" y="6" width="28" height="20" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  </symbol>
  <symbol id="aspect-3-4" viewBox="0 0 32 32">
    <rect x="6" y="2" width="20" height="28" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  </symbol>
  <symbol id="aspect-21-9" viewBox="0 0 32 32">
    <rect x="2" y="13" width="28" height="6" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  </symbol>
</svg>

<div class="app">
  <header class="topbar">
    <div class="topbar__logo">Video Ad Generator</div>
    <nav class="topbar__tabs" role="tablist">
      <button class="topbar__tab topbar__tab--active" data-panel="generate" role="tab">動画作成</button>
      <button class="topbar__tab" data-panel="pending" role="tab">承認待ち</button>
      <button class="topbar__tab" data-panel="confirmed" role="tab">確定済み</button>
      <a class="topbar__tab" href="/static/templates.html">テンプレート</a>
    </nav>
    <span id="header-stats" style="margin-left:auto;font-size:13px;color:var(--text-secondary);"></span>
  </header>

  <main class="main">
    <!-- 動画作成: sidebar + canvas -->
    <aside class="sidebar" id="panel-generate-sidebar">

      <!-- 画像ソース -->
      <section class="section">
        <label class="section__label">画像</label>
        <div class="segmented" role="radiogroup" aria-label="画像ソース" id="image-source-segmented">
          <button class="segmented__btn segmented__btn--active" data-image-source="generated" role="radio" aria-checked="true">生成</button>
          <button class="segmented__btn" data-image-source="uploaded" role="radio" aria-checked="false">アップロード</button>
        </div>
        <input type="file" id="image-file" accept="image/png,image/jpeg" hidden>
      </section>

      <!-- 画像プロンプト -->
      <section class="section">
        <label class="section__label" for="image-prompt">画像プロンプト</label>
        <textarea class="input" id="image-prompt" placeholder="例: Portrait photo of a warm Japanese woman in her 30s..."></textarea>
      </section>

      <!-- 動画プロンプト -->
      <section class="section">
        <label class="section__label" for="video-prompt">動画プロンプト</label>
        <textarea class="input" id="video-prompt" placeholder="例: Gentle camera pan, natural lighting..."></textarea>
      </section>

      <!-- Provider -->
      <section class="section">
        <label class="section__label">プロバイダー</label>
        <div class="segmented" role="radiogroup" aria-label="プロバイダー" id="provider-segmented">
          <!-- JS で構築 -->
        </div>
      </section>

      <!-- Quality -->
      <section class="section">
        <label class="section__label">画質</label>
        <div class="segmented" role="radiogroup" aria-label="画質" id="quality-segmented">
          <button class="segmented__btn segmented__btn--active" data-quality="low" role="radio" aria-checked="true">Low</button>
          <button class="segmented__btn" data-quality="high" role="radio" aria-checked="false">High</button>
        </div>
      </section>

      <!-- Aspect ratio -->
      <section class="section">
        <label class="section__label">アスペクト比</label>
        <div class="chip-grid" role="radiogroup" aria-label="アスペクト比" id="aspect-grid">
          <!-- JS で構築 -->
        </div>
      </section>

      <!-- Duration -->
      <section class="section">
        <label class="section__label">尺</label>
        <div class="segmented" role="radiogroup" aria-label="尺" id="duration-segmented">
          <!-- JS で構築 -->
        </div>
      </section>

      <!-- Camera preset -->
      <section class="section">
        <label class="section__label" for="camera-preset">カメラプリセット</label>
        <select id="camera-preset" class="input">
          <option value="">なし</option>
          <option value="static">固定</option>
          <option value="dolly_in">ドリーイン</option>
          <option value="dolly_out">ドリーアウト</option>
          <option value="pan_left">左パン</option>
          <option value="pan_right">右パン</option>
          <option value="tilt_up">上ティルト</option>
          <option value="orbit_left">左オービット</option>
        </select>
      </section>

      <!-- Cost & CTA -->
      <div class="cost-line" aria-live="polite">推定コスト: <span id="cost-estimate">$0.00</span></div>
      <button class="cta" id="generate-btn">動画を作成</button>

    </aside>

    <!-- 動画作成 canvas -->
    <section class="canvas" id="panel-generate-canvas">
      <div id="error-banner" class="banner banner--error" role="alert" hidden></div>
      <div id="preview-area"></div>
      <div class="section" style="margin-top: var(--space-xl);">
        <h3>最近のジョブ</h3>
        <div class="chip-grid" id="recent-jobs"></div>
      </div>
      <button class="btn-secondary" onclick="startBatch(this)" style="margin-top:var(--space-lg);">バッチ生成（月10本）</button>
    </section>

    <!-- 承認待ち panel: full-width -->
    <section class="canvas" id="panel-pending" hidden>
      <h2 style="font-size:16px;font-weight:600;margin-bottom:var(--space-md);">承認待ち画像</h2>
      <div id="pending-grid" class="image-grid">
        <div class="empty-state">承認待ちの画像はありません</div>
      </div>
    </section>

    <!-- 確定済み panel: full-width -->
    <section class="canvas" id="panel-confirmed" hidden>
      <h2 style="font-size:16px;font-weight:600;margin-bottom:var(--space-md);">確定済み動画</h2>
      <div id="confirmed-grid" class="video-grid">
        <div class="empty-state">確定済み動画はまだありません</div>
      </div>
    </section>
  </main>
</div>

<div id="toast"></div>

<script src="/static/js/generate.js" defer></script>
</body>
</html>
