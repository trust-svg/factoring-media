<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テンプレート | Video Ad Generator</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/templates.css">
  <script src="/static/js/templates.js" defer></script>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="topbar__logo">Video Ad Generator</div>
    <nav class="topbar__tabs">
      <a class="topbar__tab" href="/">動画作成</a>
      <a class="topbar__tab" href="/">承認待ち</a>
      <a class="topbar__tab" href="/">確定済み</a>
      <a class="topbar__tab topbar__tab--active" href="/static/templates.html">テンプレート</a>
    </nav>
  </header>

  <main class="main">
    <section class="canvas">
      <div class="templates-header">
        <h1>テンプレート</h1>
        <div class="templates-header__spacer"></div>
        <label><input type="checkbox" id="show-archived"> アーカイブを表示</label>
        <button class="btn-primary" id="btn-new">+ 新規作成</button>
      </div>

      <div id="template-grid" class="template-grid"></div>
    </section>
  </main>
</div>

<dialog id="modal" class="modal">
  <h2 class="modal__title" id="modal-title">テンプレート作成</h2>
  <input type="hidden" id="m-id">

  <div class="modal__field">
    <label for="m-name">名前</label>
    <input type="text" id="m-name">
  </div>

  <div class="modal__field">
    <label for="m-category">カテゴリ</label>
    <select id="m-category">
      <option value="custom">custom</option>
      <option value="matching_ad">matching_ad</option>
      <option value="sns_post">sns_post</option>
      <option value="product_showcase">product_showcase</option>
    </select>
  </div>

  <div class="modal__field">
    <label for="m-image-prompt">画像プロンプト</label>
    <textarea id="m-image-prompt"></textarea>
  </div>

  <div class="modal__field">
    <label for="m-video-prompt">動画プロンプト</label>
    <textarea id="m-video-prompt"></textarea>
  </div>

  <div class="modal__row">
    <div class="modal__field">
      <label for="m-provider">プロバイダー</label>
      <select id="m-provider">
        <option value="seedance">seedance</option>
        <option value="veo3_lite">veo3_lite</option>
        <option value="kling3_pro">kling3_pro</option>
      </select>
    </div>
    <div class="modal__field">
      <label for="m-quality">画質</label>
      <select id="m-quality">
        <option value="low">low</option>
        <option value="high">high</option>
      </select>
    </div>
  </div>

  <div class="modal__row">
    <div class="modal__field">
      <label for="m-aspect">アスペクト比</label>
      <select id="m-aspect">
        <option value="9:16">9:16</option>
        <option value="16:9">16:9</option>
        <option value="1:1">1:1</option>
        <option value="4:3">4:3</option>
        <option value="3:4">3:4</option>
        <option value="21:9">21:9</option>
      </select>
    </div>
    <div class="modal__field">
      <label for="m-duration">尺（秒）</label>
      <select id="m-duration">
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="10">10</option>
      </select>
    </div>
  </div>

  <div class="modal__field">
    <label for="m-camera">カメラプリセット</label>
    <select id="m-camera">
      <option value="">（なし）</option>
      <option value="static">static</option>
      <option value="dolly_in">dolly_in</option>
      <option value="dolly_out">dolly_out</option>
      <option value="pan_left">pan_left</option>
      <option value="pan_right">pan_right</option>
      <option value="tilt_up">tilt_up</option>
      <option value="orbit_left">orbit_left</option>
    </select>
  </div>

  <div class="modal__error" id="m-error"></div>

  <div class="modal__footer">
    <button class="btn-secondary" id="m-cancel">キャンセル</button>
    <button class="btn-primary" id="m-save">保存</button>
  </div>
</dialog>

</body>
</html>
