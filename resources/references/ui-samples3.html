<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>UI パターン参考 vol.3 — 組み合わせ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Sans', sans-serif; background: #e8eaed; padding: 24px; }
h1 { font-size: 16px; color: #333; margin-bottom: 4px; }
.sub { font-size: 11px; color: #888; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
.card { background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.card-label { font-size: 11px; font-weight: 700; padding: 7px 14px; background: #1a3a6b; color: #aac; letter-spacing: .4px; }
.tag { display:inline-block; font-size:9px; padding:1px 6px; border-radius:10px; margin-left:4px; font-weight:600; }
</style>
</head>
<body>
<h1>eBay Agent Hub — 組み合わせパターン（推奨案）</h1>
<p class="sub">②+③+⑨のベスト要素を組み合わせた実装候補。A〜D は実際に採用できる完成度で作成。</p>
<div class="grid" id="grid"></div>
<script>
const P = [

{ label: "【推奨①】② Navy サイドナビ ＋ ③ ホワイトカード ＋ ⑨ テーブル  ─ 王道日系SaaS完全体", html: `
<div style="background:#f0f4f8;height:380px;display:flex;font-family:'Hiragino Sans',sans-serif;font-size:11px">

    ${[['📊','ダッシュボード',true],['📦','在庫管理',false],['🛒','受注管理',false],['💬','メッセージ',false],['📈','分析レポート',false],['⚙','設定',false]].map(([ic,l,a])=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${a?'#eff6ff':'transparent'};color:${a?'#1b3d6e':'#4b5563'};border-right:${a?'3px solid #1b3d6e':'3px solid transparent'}">
      <span>${ic}</span><span style="font-size:10px;font-weight:${a?700:400}">${l}</span>
    </div>`).join('')}

    <!-- KPIカード（③由来） -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px">
      ${[['月間売上','¥891,000','¥5,000,000 目標','64%','▲12%','#1b3d6e'],
         ['利益率','18.4%','20.0% 目標','92%','▼1.6pp','#dc2626'],
         ['月間利益','¥447,000','¥1,000,000 目標','59%','▲8%','#059669']].map(([l,v,t,r,d,c])=>`

        <thead><tr style="background:#f8fafc">${['項目','件数','重要度','月末予測'].map(h=>`<th style="padding:5px 10px;text-align:left;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">${h}</th>`).join('')}</tr></thead>
        <tbody>
          ${[['在庫切れ','7件','🔴 緊急','¥1,337K (↑目標達成)'],['未読メッセージ','3件','🟡 要確認','—'],['価格アラート','2件','🟡 要確認','—']].map(([l,v,s,p])=>`
          <tr style="border-bottom:1px solid #f3f4f6">
            <td style="padding:6px 10px;color:#374151">${l}</td>
            <td style="padding:6px 10px;font-weight:700">${v}</td>
            <td style="padding:6px 10px">${s}</td>
            <td style="padding:6px 10px;color:#6b7280">${p}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
</div>` },

{ label: "【推奨②】② Navy ＋ ③ フラット ＋ カレンダー重視  ─ 売上の波が見える版", html: `
<div style="background:#f5f7fb;height:380px;display:flex;font-family:'Hiragino Sans',sans-serif;font-size:11px">
  <!-- コンパクトサイドナビ -->
  <div style="width:44px;background:#1b3d6e;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:16px">
    ${['📊','📦','💬','📈','⚙'].map(i=>`<span style="font-size:14px">${i}</span>`).join('')}
  </div>
  <div style="flex:1;padding:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:12px;font-weight:700;color:#1b3d6e">概要</span>
      <span style="font-size:9px;color:#9ca3af">2026年4月</span>
      <!-- アラートバー -->
      <div style="margin-left:auto;display:flex;gap:6px">
        <span style="background:#fee2e2;color:#dc2626;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px">在庫切れ 7</span>
        <span style="background:#dbeafe;color:#1d4ed8;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px">未読 3</span>
      </div>
    </div>
    <!-- 達成カード 3枚 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px">
      ${[['売上','¥891K','¥5M','64','▲12%','#1b3d6e'],['利益率','18.4%','20%','92','▼1.6pp','#dc2626'],['利益','¥447K','¥1M','59','▲8%','#059669']].map(([l,v,t,r,d,c])=>`
      <div style="background:white;border-radius:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
        <div style="font-size:9px;color:#9ca3af">${l}</div>
        <div style="font-size:16px;font-weight:700;color:#1a1a1a;margin:2px 0">${v}<span style="font-size:10px;color:#9ca3af;font-weight:400"> / ${t}</span></div>
        <div style="height:4px;background:#f3f4f6;border-radius:4px;margin-bottom:4px"><div style="width:${r}%;height:100%;background:${c};border-radius:4px"></div></div>
        <div style="display:flex;justify-content:space-between">
          <span style="font-size:9px;font-weight:700;color:${c}">${r}%</span>
          <span style="font-size:9px;color:${d.startsWith('▲')?'#059669':'#dc2626'}">${d}</span>
        </div>
      </div>`).join('')}
    </div>
    <!-- カレンダー（メイン） -->
    <div style="background:white;border-radius:8px;padding:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
      <div style="font-size:10px;font-weight:700;color:#1b3d6e;margin-bottom:8px">4月 売上カレンダー</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${['日','月','火','水','木','金','土'].map(d=>`<div style="text-align:center;font-size:8px;color:#9ca3af;padding:2px 0">${d}</div>`).join('')}
        ${[0,0,1,2,3,4,5].map(d=>d===0?`<div></div>`:`<div style="aspect-ratio:1;background:#f3f4f6;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px">${d}</div>`).join('')}
        ${[6,7,8,9,10,11,12].map((d,i)=>{
          const revs=[0,1,0.4,0.7,0.9,0,0];
          const r=revs[i];
          return `<div style="aspect-ratio:1;border-radius:4px;background:${r>0?`rgba(27,61,110,${r*0.7})`:'#f3f4f6'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${r>0.4?'white':'#666'}">${d}</div>`;
        }).join('')}
        ${[13,14,15,16,17,18,19].map((d,i)=>{
          const revs=[0.5,0.3,0.8,0.6,0,0,0];
          const r=revs[i];
          return `<div style="aspect-ratio:1;border-radius:4px;background:${r>0?`rgba(27,61,110,${r*0.7})`:'#f3f4f6'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${r>0.4?'white':'#666'}">${d}</div>`;
        }).join('')}
        ${[20,21,22,23,24,25,26].map((d,i)=>{
          const today=12;
          return `<div style="aspect-ratio:1;border-radius:4px;background:${d>today?'#f8f8f8':'#f3f4f6'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${d>today?'#d1d5db':'#666'};opacity:${d>today?0.4:1}">${d}</div>`;
        }).join('')}
      </div>
    </div>
  </div>
</div>` },

        <thead><tr>${['項目','件数','優先'].map(h=>`<th style="padding:4px 8px;text-align:left;color:#9ca3af;font-weight:600;border-bottom:1px solid #f3f4f6">${h}</th>`).join('')}</tr></thead>
        <tbody>
          ${[['在庫切れ','7','🔴'],['未読','3','🟡'],['価格','2','🟡'],['同期','1','⚪']].map(([l,v,s])=>`
          <tr style="border-bottom:1px solid #f9fafb">

    <div style="position:relative;padding-left:16px">
      <div style="position:absolute;left:5px;top:0;bottom:0;width:1px;background:#e5e7eb"></div>
      ${[['12:49','在庫切れ検知','SKU-4821','#dc2626'],
         ['11:15','新規注文 3件','¥24,800','#2563eb'],
         ['10:02','価格アラート','競合値下げ','#d97706'],
         ['09:30','同期完了','eBay↔Shopify','#059669'],
         ['09:00','日次レポート','昨日 ¥18,400','#6b7280']].map(([t,l,d,c])=>`
      <div style="margin-bottom:10px;position:relative">
        <div style="position:absolute;left:-16px;top:5px;width:7px;height:7px;border-radius:50%;background:${c}"></div>
        <div style="font-size:9px;color:#9ca3af">${t}</div>
        <div style="font-size:10px;font-weight:700;color:#1f2937">${l}</div>
        <div style="font-size:10px;color:#6b7280">${d}</div>
      </div>`).join('')}
    </div>
  </div>
</div>` },

{ label: "【推奨④】② Navy ＋ ⑨ テーブル全振り  ─ 最も「業務システム」らしい版", html: `
<div style="background:#eef2f8;height:380px;display:flex;flex-direction:column;font-family:'Hiragino Sans',sans-serif;font-size:11px">
  <!-- 上部ナビ（②）-->

      ${[['月間売上','¥891K','64%達成'],['利益率','18.4%','92%達成'],['月間利益','¥447K','59%達成'],['注文数','89件','14%増'],['在庫切れ','7件','要対応']].map(([l,v,s])=>`

      <table style="width:100%;border-collapse:collapse;font-size:10px">

        <tbody>

const grid = document.getElementById('grid');
P.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="card-label">${p.label}</div><div>${p.html}</div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
